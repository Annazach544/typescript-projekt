<h1>Mitt ramschema</h1>

<div class="summary">
  <p>Antal valda kurser: {{ selectedCourses().length }}</p>
  <p>Totalt antal högskolepoäng: {{ totalPoints() }}</p>
</div>

<div class="table-wrapper">
<table *ngIf="selectedCourses().length > 0">
  <thead>
    <tr>
      <th>Kurskod</th>
      <th>Kursnamn</th>
      <th>Poäng</th>
      <th>Ta bort</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let course of selectedCourses()">
      <td>{{ course.courseCode }}</td>
      <td>{{ course.courseName }}</td>
      <td>{{ course.points }}</td>
      <td>
        <button (click)="removeCourse(course.courseCode)">Ta bort</button>
      </td>
    </tr>
  </tbody>
</table>
</div>

<div class="empty-message" *ngIf="selectedCourses().length === 0">
  <p>Du har inte lagt till några kurser ännu.</p>
</div>
