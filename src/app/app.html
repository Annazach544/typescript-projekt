<h1>Kurser</h1>

<table border="1" cellpadding="8">
  <thead>
    <tr>
      <th>Kurskod</th>
      <th>Kursnamn</th>
      <th>Progression</th>
    </tr>
  </thead>

  <tbody>
    @for (course of courses(); track course.code) {
      <tr>
        <td>{{ course.code }}</td>
        <td>{{ course.coursename }}</td>
        <td>{{ course.progression }}</td>
      </tr>
    }
  </tbody>
</table>
