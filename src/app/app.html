<h1>Kurser</h1>

<input
  type="text"
  placeholder="Sök kurskod eller kursnamn"
  (input)="searchTerm.set($any($event.target).value)"
>

<table border="1" cellpadding="8">
  <thead>
    <tr>
      <th (click)="setSort('code')">Kurskod</th>
      <th (click)="setSort('coursename')">Kursnamn</th>
      <th (click)="setSort('progression')">Progression</th>
    </tr>
  </thead>

  <tbody>
    @for (course of sortedCourses(); track course.code) {
      <tr>
        <td>{{ course.code }}</td>
        <td>{{ course.coursename }}</td>
        <td>{{ course.progression }}</td>
      </tr>
    }
  </tbody>
</table>
